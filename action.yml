apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: ecr-actions
inputs:
  registry-url: # id of input
    description: 'registry url'
    required: true
  source-repository-name: # id of input
    description: 'source repository name'
    required: true
  target-repository-name: # id of input
    description: 'target repository name. Note: if empty or same as source repository name,  target-tag must exists different from source tag'
    required: false
    default: ''
  source-tag: # id of input
    description: 'source tag name'
    required: true
  target-tag: # id of input
    description: 'target tag name. Note:if not provided target-repository-name must exist and different from source-repository-name'
    required: false
    default: ''
  artifact-name:
    description: >
      The name of the artifact, used when registering the build artifact in CloudBees platform.
      By default the target repository name is used.
    required: false
  component-id:
    description: >
      The ID of the component associated with the artifact. If not provided, the artifact is registered with the component of the current workflow run.
    default: ${{ cloudbees.component.id }}
    required: false

outputs:
  artifact-id:
    value: ${{ steps.register-artifact.outputs.artifact-id }}
    description: "The unique identifier of the artifact."

runs:
  using: composite
  steps:
    - id: ecr-action-promote
      name: ecr-action-promote
      env:
        CLOUDBEES_API_URL: ${{ cloudbees.api.url }}
        CLOUDBEES_API_TOKEN: ${{ cloudbees.api.token }}
        CLOUDBEES_RUN_ID: ${{ cloudbees.run_id }}
        CLOUDBEES_RUN_ATTEMPT: ${{ cloudbees.run_attempt }}
      uses: docker://020229604682.dkr.ecr.us-east-1.amazonaws.com/actions/crane-docker-image:CBP-34809-fix-dependencies-7ad2d598c747f3ba59bd1c8cf57e3a0a2e74bbc3
      shell: bash
      run: |
             set -x
             
             if [ "${{ inputs.target-repository-name }}" == "" ] || [ "${{ inputs.source-repository-name }}" == "${{ inputs.target-repository-name }}" ]; then
               if  [ "${{ inputs.target-tag }}" == "" ] || [ "${{ inputs.source-tag }}" == "${{ inputs.target-tag }}" ]; then
                   echo "target-tag cannot be empty or must be differ from source-tag, when provided target-repository-name is either empty or equal to source-repository-name"
                   exit 1
              fi
             fi
             targetRepo="${{ inputs.target-repository-name }}"
             
             if [ "$targetRepo" == "" ]; then
               targetRepo="${{ inputs.source-repository-name }}"
             fi
             echo "targetRepo: $targetRepo"
             
             # Crane uses registry/repo:tag format (no docker:// prefix)
             craneSource="${{ inputs.registry-url }}/${{ inputs.source-repository-name }}:${{ inputs.source-tag }}"
             craneTarget="${{ inputs.registry-url }}/$targetRepo:${{ inputs.target-tag }}"

             # URLs with docker:// prefix for artifact registration
             sourceUrl="docker://${{ inputs.registry-url }}/${{ inputs.source-repository-name }}:${{ inputs.source-tag }}"
             targetUrl="docker://${{ inputs.registry-url }}/$targetRepo:${{ inputs.target-tag }}"

             # crane auth login  #  --region us-west-2
             aws ecr get-login-password  | crane auth login --username AWS --password-stdin ${{ inputs.registry-url }}

             digest=$(crane digest "$craneSource")
             
             if [ -n "${{ inputs.artifact-name }}" ] && [ "${{ inputs.artifact-name }}" != "" ]; then
              artifactName="${{ inputs.artifact-name }}"
             else
              artifactName="$targetRepo"
             fi
        
             # Set variables for register artifact API call
             printf %s "$artifactName" > $CLOUDBEES_OUTPUTS/artifact-name
             printf %s "$targetUrl" > $CLOUDBEES_OUTPUTS/target-url
             printf %s "$digest" > $CLOUDBEES_OUTPUTS/digest
        
             #perform crane copy action
             crane copy "$craneSource" "$craneTarget" || {
               crane_exit_status=$?
               echo "Image promotion failed. Artifact information will not be published to Platform"
               exit $crane_exit_status
             }
    - id: register-artifact
      name: Register Build Artifact
      uses: cloudbees-io/register-build-artifact@v2
      with:
        name: ${{ steps.ecr-action-promote.outputs.artifact-name }}
        url: ${{ steps.ecr-action-promote.outputs.target-url }}
        version: ${{ inputs.target-tag }}
        digest: ${{ steps.ecr-action-promote.outputs.digest }}
        component-id: ${{ inputs.component-id }}
        type: "docker"


